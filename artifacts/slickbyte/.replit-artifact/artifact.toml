kind = "web"
previewPath = "/"
title = "SlickByte"
version = "1.0.0"
id = "artifacts/slickbyte"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20668

[services.development]
run = "pnpm --filter @workspace/slickbyte run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/slickbyte", "run", "build" ]
publicDir = "artifacts/slickbyte/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20668"
BASE_PATH = "/"
